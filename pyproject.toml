[project]
name = "methodproof"
version = "0.1.0"
description = "See how you code — capture and visualize your engineering process"
requires-python = ">=3.11"
dependencies = ["watchdog>=4.0"]
license = "Apache-2.0"
readme = "README.md"

[project.optional-dependencies]
e2e = ["cryptography>=43.0"]
signing = ["cryptography>=43.0"]
live = ["websocket-client>=1.7"]

[project.scripts]
methodproof = "methodproof.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["methodproof"]

[tool.pytest.ini_options]
testpaths = ["tests"]
